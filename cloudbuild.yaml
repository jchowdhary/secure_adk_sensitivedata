steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/adk-repo/adk-agents:${_VERSION}'
      - '.'
  
  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'push'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/adk-repo/adk-agents:${_VERSION}'
  
  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'adk-agents'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/adk-repo/adk-agents:${_VERSION}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--service-account'
      - 'adk-agents-sa@${PROJECT_ID}.iam.gserviceaccount.com'
      - '--set-env-vars'
      - 'GOOGLE_CLOUD_PROJECT=${PROJECT_ID},GOOGLE_CLOUD_LOCATION=${_REGION},GOOGLE_GENAI_USE_VERTEXAI=1,MODEL=gemini-2.5-flash,LOAD_FROM_SECRET_MANAGER=true,SECRETS_TO_LOAD=dlp-config,OTEL_EXPORTER_TYPE=gcp,OTEL_STRUCTURED_LOGS=true'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--timeout'
      - '300'
      - '--allow-unauthenticated'

substitutions:
  _REGION: us-central1
  _VERSION: latest

options:
  logging: CLOUD_LOGGING_ONLY
